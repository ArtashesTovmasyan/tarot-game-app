<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarot Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>🔮 Чертоги Таро</h1>
    <p id="welcome-text">Добро пожаловать, смельчак! Карты ждут твоего выбора.</p>
    <div class="buttons">
        <button onclick="startDraw('single')">Вытянуть карту 🔮</button>
        <button onclick="startDraw('three')">Расклад из трёх 🌌</button>
        <button onclick="showDailyHoroscope()">Гороскоп дня 🌟</button>
        <button onclick="showDailyCard()">Карта дня 🎴</button>
        <button onclick="showHelp()">Помощь ❓</button>
        <button onclick="restart()">Перезапустить ♻️</button>
    </div>
    <div id="deck" class="deck"></div>
    <div id="result" class="result"></div>
</div>
<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarot Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>🔮 Чертоги Таро</h1>
    <p id="welcome-text">Добро пожаловать, смельчак! Карты ждут твоего выбора.</p>
    <div class="buttons">
        <button id="draw-single">Вытянуть карту 🔮</button>
        <button id="draw-three">Расклад из трёх 🌌</button>
        <button id="daily-horoscope">Гороскоп дня 🌟</button>
        <button id="daily-card">Карта дня 🎴</button>
        <button id="help">Помощь ❓</button>
        <button id="restart">Перезапустить ♻️</button>
        <button id="test-scroll">Тест скролла 📜</button> <!-- Новая кнопка -->
    </div>
    <div id="deck" class="deck"></div>
    <div id="result" class="result"></div>
</div>
<script src="script.js"></script>
</body>
</html>
